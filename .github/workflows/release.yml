name: release

# Builds BLACKOUT for every platform and attaches the installers to a GitHub
# Release. Trigger by pushing a version tag (e.g. `git tag v0.2.0 && git push
# --tags`) or run manually from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---- Desktop: macOS (Apple Silicon + Intel), Windows, Linux ----
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - name: Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install frontend deps
        working-directory: app
        run: npm install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "BLACKOUT ${{ github.ref_name }}"
          releaseBody: "Privacy in one tap — desktop installers + Android APK below. Everything runs locally."
          releaseDraft: false
          prerelease: false

  # ---- Android: arm64 APK ----
  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;27.1.12297006"
      - name: Install frontend deps
        working-directory: app
        run: npm install
      - name: Build APK
        working-directory: app
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
        run: npm run tauri -- android build --apk --target aarch64
      - name: Sign APK
        # Add these repo secrets to get a signed, installable APK:
        #   ANDROID_KEYSTORE_BASE64  (base64 of your .keystore)
        #   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore
          BT=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          UNSIGNED=app/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
          "$BT/zipalign" -p -f 4 "$UNSIGNED" aligned.apk
          "$BT/apksigner" sign --ks release.keystore --ks-pass pass:$ANDROID_KEYSTORE_PASSWORD \
            --key-pass pass:$ANDROID_KEY_PASSWORD --ks-key-alias $ANDROID_KEY_ALIAS \
            --out BLACKOUT-arm64.apk aligned.apk
      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BLACKOUT-arm64.apk
            app/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
